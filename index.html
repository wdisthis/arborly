<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arborly - Indented Tree Generator</title>
    <link rel="stylesheet" href="styles/main.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Arborly</h1>
            <div class="actions">
                <button id="btn-export">Export PNG</button>
            </div>
        </header>
        
        <main>
            <div class="editor-pane">
                <textarea id="text-input" placeholder="Tulis struktur di sini...
Parent
  Child 1
    Grandchild
  Child 2"></textarea>
            </div>
            <div class="preview-pane" id="tree-container">
                </div>
        </main>
    </div>

    <script src="js/parser.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/exporter.js"></script>
    <script>
        const input = document.getElementById('text-input');
        input.addEventListener('input', () => {
            const treeData = parseIndentedText(input.value);
            renderTree(treeData);
        });
    </script>
</body>
</html>

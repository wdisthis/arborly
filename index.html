<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arborly - Indented Tree Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Arborly</h1>
            <div class="actions">
                <button id="btn-export-png">PNG</button>
                <button id="btn-export-pdf">PDF</button>
                <button id="btn-export-svg">SVG</button>
                <button id="btn-export-html">HTML</button>
            </div>
        </header>
        
        <main>
            <div class="editor-pane">
                <div class="sidebar-header">
                    <h2>Diagram Structure</h2>
                    <input type="file" id="file-upload" accept=".txt">
                    <button class="upload-btn" onclick="document.getElementById('file-upload').click()">Upload TXT</button>
                </div>
                <textarea id="text-input" placeholder="">Arborly
  Features
    Easy to Use
    Multiple Exports
    Premium Design
  How to Use
    Write with Indentation
    Live Preview
    Download Results</textarea>
            </div>
            <div class="preview-pane" id="tree-container">
                </div>
        </main>
    </div>

    <script src="js/parser.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/exporter.js"></script>
    <script>
        const input = document.getElementById('text-input');
        
        input.addEventListener('input', () => {
            const treeData = parseIndentedText(input.value);
            renderTree(treeData);
        });

        // Tab support for indentation & Enter for auto-indent
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = input.selectionStart;
                const end = input.selectionEnd;
                // Insert 2 spaces
                input.value = input.value.substring(0, start) + "  " + input.value.substring(end);
                // Move cursor
                input.selectionStart = input.selectionEnd = start + 2;
                
                // Trigger input event to update tree
                input.dispatchEvent(new Event('input'));
            } else if (e.key === 'Enter') {
                e.preventDefault();
                const start = input.selectionStart;
                const end = input.selectionEnd;
                const value = input.value;
                
                // Find indentation of current line
                const lineStart = value.lastIndexOf('\n', start - 1) + 1;
                const currentLine = value.substring(lineStart, start);
                const indentMatch = currentLine.match(/^\s*/);
                const indent = indentMatch ? indentMatch[0] : "";
                
                input.value = value.substring(0, start) + "\n" + indent + value.substring(end);
                input.selectionStart = input.selectionEnd = start + 1 + indent.length;
                
                input.dispatchEvent(new Event('input'));
            } else if (e.key === 'Backspace') {
                const start = input.selectionStart;
                const end = input.selectionEnd;
                const value = input.value;
                
                // If no selection and cursor is at least 2 chars in
                if (start === end && start >= 2) {
                    const before = value.substring(start - 2, start);
                    if (before === "  ") {
                        // Find start of line
                        const lineStart = value.lastIndexOf('\n', start - 1) + 1;
                        const textBefore = value.substring(lineStart, start);
                        
                        // If only spaces before cursor on this line, delete 2 spaces at once
                        if (textBefore.trim() === "") {
                            e.preventDefault();
                            input.value = value.substring(0, start - 2) + value.substring(start);
                            input.selectionStart = input.selectionEnd = start - 2;
                            input.dispatchEvent(new Event('input'));
                        }
                    }
                }
            }
        });

        // TXT Upload Support
        document.getElementById('file-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                input.value = e.target.result;
                input.dispatchEvent(new Event('input'));
            };
            reader.readAsText(file);
            // Reset input file so same file can be uploaded again
            e.target.value = '';
        });

        // Initial render
        window.addEventListener('DOMContentLoaded', () => {
            const treeData = parseIndentedText(input.value);
            renderTree(treeData);
        });
    </script>
</body>
</html>
